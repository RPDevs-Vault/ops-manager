name: Global Actions Auditor

on:
  schedule:
  - cron: '0 * * * *'   # Run every hour
  workflow_dispatch: # Allow manual triggers

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Actions Auditor
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        chmod +x action/audit_actions.py
        python3 action/audit_actions.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "RPDevs Bot"
        git config --global user.email "bot@iamrp.dev"
        git add README.md
        if ! git diff-index --quiet HEAD; then
          git commit -m "chore: update live actions dashboard [skip ci]"
          git pull origin main --rebase
          git push origin main
        else
          echo "No changes to commit"
        fi
