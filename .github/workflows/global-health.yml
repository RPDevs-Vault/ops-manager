name: Global Health Dashboard

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cockpit/aggregate_health.py'
      - '.github/workflows/global-health.yml'

jobs:
  update-dashboard:
    name: Aggregate Manager Health
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregator
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          chmod +x cockpit/aggregate_health.py
          python3 cockpit/aggregate_health.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update health dashboard [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
